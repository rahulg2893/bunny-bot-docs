<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bunny Bot Docs</title>
    <meta
      name="description"
      content="Command documentation for Bunny Bot categories including moderation, utility, levels, economy, and setup."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f3ff;
        --surface: #ffffff;
        --ink: #2f2342;
        --muted: #7f6f99;
        --line: #eadffd;
        --brand: #f29fd6;
        --brand2: #bda4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 15%, rgba(242, 159, 214, 0.16) 0, transparent 36%),
          radial-gradient(circle at 92% 12%, rgba(189, 164, 255, 0.16) 0, transparent 34%),
          linear-gradient(180deg, #fdf9ff 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(1180px, 92vw);
        margin: 0 auto;
      }

      .top {
        position: sticky;
        top: 0;
        backdrop-filter: blur(8px);
        background: rgba(248, 246, 240, 0.85);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 30;
      }

      .top-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 13px 0;
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-weight: 700;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a {
        padding: 7px 11px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .nav a:hover {
        background: rgba(0, 0, 0, 0.07);
      }

      .hero {
        padding: 30px 0 18px;
      }

      h1,
      h2,
      h3 {
        font-family: "Syne", sans-serif;
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 3.4vw, 2.75rem);
      }

      .lead {
        color: var(--muted);
        margin-top: 8px;
      }

      .search {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .search input {
        border: 1px solid #e8dcff;
        background: #ffffff;
        color: var(--ink);
        border-radius: 14px;
        padding: 13px 14px;
        font: inherit;
      }

      .search button {
        border: 1px solid #e8dcff;
        border-radius: 14px;
        background: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 0 14px;
        cursor: pointer;
      }

      .layout {
        padding-bottom: 46px;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 14px;
      }

      .sidebar {
        position: sticky;
        top: 74px;
        align-self: start;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        font-weight: 700;
        border-radius: 11px;
        color: #4f4169;
      }

      .sidebar a:hover {
        background: #f8f2ff;
      }

      .content {
        display: grid;
        gap: 14px;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 16px;
      }

      .section p {
        color: var(--muted);
        margin: 8px 0 0;
      }

      .cards {
        margin-top: 13px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .cmd {
        border: 1px solid #eee3ff;
        border-radius: 14px;
        background: #ffffff;
        padding: 11px;
      }

      .cmd-title {
        font-weight: 800;
        margin-bottom: 8px;
      }

      code {
        background: #f7f2ff;
        border: 1px solid #ede3ff;
        border-radius: 8px;
        padding: 2px 6px;
      }

      .meta {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      mark {
        background: #ffd9f2;
        border-radius: 4px;
      }

      .empty {
        display: none;
        padding: 18px;
        border: 1px dashed #cabdae;
        border-radius: 14px;
        color: var(--muted);
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          display: flex;
          overflow-x: auto;
          gap: 8px;
        }

        .sidebar a {
          white-space: nowrap;
          border: 1px solid #e6dbce;
        }
      }

      @media (max-width: 760px) {
        .cards {
          grid-template-columns: 1fr;
        }
      }

      body {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      body.page-ready {
        opacity: 1;
        transform: translateY(0);
      }

      body.page-exit {
        opacity: 0;
        transform: translateY(-6px);
      }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="container top-inner">
        <a class="brand" href="index.html">🐰 Bunny Bot Docs</a>
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="faq.html">FAQ</a>
          <a href="privacy.html">Privacy</a>
          <a href="tos.html">ToS</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Command Documentation</h1>
        <p class="lead">Search commands quickly, copy syntax, and configure faster.</p>
        <div class="search">
          <input id="searchInput" placeholder="Search command or keyword (e.g. ticket, warn, twitch)" />
          <button id="clearBtn" type="button">Clear</button>
        </div>
      </section>

      <section class="layout">
        <aside class="sidebar" id="toc"></aside>
        <div class="content" id="content"></div>
      </section>

      <div class="empty" id="emptyState">No commands matched your search.</div>
    </main>

    <script>
      const DOCS = [
        {
          id: "moderation",
          title: "🛡 Moderation",
          note: "Core moderation controls for everyday server management.",
          commands: [
            { cmd: ",warn <user> [reason]", desc: "Warn a member.", perms: "Moderate Members" },
            { cmd: ",mute <user> <duration> [reason]", desc: "Timeout a member.", perms: "Moderate Members" },
            { cmd: ",unmute <user>", desc: "Remove timeout.", perms: "Moderate Members" },
            { cmd: ",kick <user> [reason]", desc: "Kick a member.", perms: "Kick Members" },
            { cmd: ",ban <user> [reason]", desc: "Ban a member.", perms: "Ban Members" },
            { cmd: ",purge <amount>", desc: "Delete recent messages.", perms: "Manage Messages" }
          ]
        },
        {
          id: "security",
          title: "🧱 AutoMod & AntiNuke",
          note: "Automated guard rails against raids, spam, and abuse.",
          commands: [
            { cmd: ",am setup", desc: "Open AutoMod setup panel.", perms: "Manage Guild" },
            { cmd: ",am toggle <feature>", desc: "Enable/disable specific filters.", perms: "Manage Guild" },
            { cmd: ",an setup", desc: "Configure anti-nuke baselines.", perms: "Manage Guild" },
            { cmd: ",an whitelist add <user|role>", desc: "Whitelist trusted entities.", perms: "Manage Guild" }
          ]
        },
        {
          id: "tickets",
          title: "🎟 Tickets",
          note: "Support workflow for staff and users.",
          commands: [
            { cmd: ",ticket setup", desc: "Create ticket panel.", perms: "Manage Guild" },
            { cmd: ",ticket close [reason]", desc: "Close current ticket.", perms: "Manage Channels" },
            { cmd: ",ticket reopen", desc: "Reopen a closed ticket.", perms: "Manage Channels" },
            { cmd: ",ticket add <user>", desc: "Add member into ticket.", perms: "Manage Channels" }
          ]
        },
        {
          id: "engagement",
          title: "📈 Levels, Economy, Quests",
          note: "Keep members active with progression and rewards.",
          commands: [
            { cmd: ",rank [user]", desc: "Show level and XP status.", perms: "None" },
            { cmd: ",work", desc: "Earn economy rewards.", perms: "None" },
            { cmd: ",balance", desc: "Check wallet and bank.", perms: "None" },
            { cmd: ",quests", desc: "View active quests.", perms: "None" },
            { cmd: ",quests claim <id>", desc: "Claim completed quest rewards.", perms: "None" }
          ]
        },
        {
          id: "utility",
          title: "🧰 Utility",
          note: "Admin and member tools that save daily effort.",
          commands: [
            { cmd: ",afk [reason]", desc: "Mark yourself AFK.", perms: "None" },
            { cmd: ",tz set <city/timezone>", desc: "Set your timezone.", perms: "None" },
            { cmd: ",bremind setup", desc: "Configure bump reminder flow.", perms: "Manage Guild" },
            { cmd: ",rr add <message_id> <emoji> <role>", desc: "Create reaction role.", perms: "Manage Roles" }
          ]
        },
        {
          id: "media",
          title: "📺 Stream Alerts & Media",
          note: "Automated notifications and media playback controls.",
          commands: [
            { cmd: ",twitch add <#channel> <streamer>", desc: "Post live notifications.", perms: "Manage Guild" },
            { cmd: ",yt add <#channel> <channel>", desc: "Post new upload notifications.", perms: "Manage Guild" },
            { cmd: ",play <query|url>", desc: "Play audio in voice channel.", perms: "None" },
            { cmd: ",queue", desc: "Show current queue.", perms: "None" }
          ]
        }
      ];

      const toc = document.getElementById("toc");
      const content = document.getElementById("content");
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const emptyState = document.getElementById("emptyState");

      const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

      function render() {
        toc.innerHTML = "";
        content.innerHTML = "";

        DOCS.forEach((section) => {
          const link = document.createElement("a");
          link.href = `#${section.id}`;
          link.textContent = section.title.replace(/^[^ ]+\s/, "");
          toc.appendChild(link);

          const card = document.createElement("section");
          card.className = "section";
          card.id = section.id;

          const h = document.createElement("h2");
          h.textContent = section.title;
          const p = document.createElement("p");
          p.textContent = section.note;

          const grid = document.createElement("div");
          grid.className = "cards";

          section.commands.forEach((c) => {
            const item = document.createElement("article");
            item.className = "cmd";
            item.innerHTML = `
              <div class="cmd-title"><code>${c.cmd}</code></div>
              <div>${c.desc}</div>
              <div class="meta">Perms: ${c.perms}</div>
            `;
            grid.appendChild(item);
          });

          card.appendChild(h);
          card.appendChild(p);
          card.appendChild(grid);
          content.appendChild(card);
        });
      }

      function applySearch(query) {
        const q = query.trim().toLowerCase();
        const cards = Array.from(document.querySelectorAll(".section"));
        const reg = q ? new RegExp(`(${escapeRegex(q)})`, "gi") : null;
        let anyVisible = false;

        cards.forEach((section) => {
          const cmdCards = Array.from(section.querySelectorAll(".cmd"));
          let sectionVisible = false;

          cmdCards.forEach((cmd) => {
            const txt = cmd.textContent.toLowerCase();
            const ok = !q || txt.includes(q);
            cmd.style.display = ok ? "" : "none";
            if (ok) sectionVisible = true;

            if (ok && reg) {
              cmd.querySelectorAll(".cmd-title code, .meta, div").forEach((node) => {
                if (!node.dataset.raw) node.dataset.raw = node.textContent;
                node.innerHTML = node.dataset.raw.replace(reg, "<mark>$1</mark>");
              });
            } else {
              cmd.querySelectorAll(".cmd-title code, .meta, div").forEach((node) => {
                if (node.dataset.raw) node.textContent = node.dataset.raw;
              });
            }
          });

          section.style.display = sectionVisible ? "" : "none";
          if (sectionVisible) anyVisible = true;
        });

        emptyState.style.display = anyVisible ? "none" : "block";
      }

      render();
      input.addEventListener("input", () => applySearch(input.value));
      clearBtn.addEventListener("click", () => {
        input.value = "";
        applySearch("");
        input.focus();
      });

      window.addEventListener("pageshow", () => {
        document.body.classList.add("page-ready");
      });

      document.querySelectorAll('a[href]').forEach((link) => {
        link.addEventListener("click", (event) => {
          const href = link.getAttribute("href");
          if (!href) return;
          if (href.startsWith("#")) return;
          if (href.startsWith("http")) return;
          if (link.target === "_blank") return;

          event.preventDefault();
          document.body.classList.remove("page-ready");
          document.body.classList.add("page-exit");
          setTimeout(() => {
            window.location.href = href;
          }, 220);
        });
      });
    </script>
  </body>
</html>
