<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bunny Bot Docs</title>
    <meta
      name="description"
      content="Command documentation for Bunny Bot categories including moderation, utility, levels, economy, and setup."

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />
    <style>
      :root {
        --bg: #f8f3ff;
        --surface: #ffffff;
        --ink: #2f2342;
        --muted: #7f6f99;
        --line: #eadffd;
        --brand: #f29fd6;
        --brand2: #bda4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 15%, rgba(242, 159, 214, 0.16) 0, transparent 36%),
          radial-gradient(circle at 92% 12%, rgba(189, 164, 255, 0.16) 0, transparent 34%),
          linear-gradient(180deg, #fdf9ff 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(1180px, 92vw);
        margin: 0 auto;
      }

      .top {
        position: sticky;
        top: 0;
        backdrop-filter: blur(8px);
        background: rgba(248, 246, 240, 0.85);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 30;
      }

      .top-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 13px 0;
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-weight: 700;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a {
        padding: 7px 11px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .nav a:hover {
        background: rgba(0, 0, 0, 0.07);
      }

      .hero {
        padding: 30px 0 18px;
      }

      h1,
      h2,
      h3 {
        font-family: "Syne", sans-serif;
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 3.4vw, 2.75rem);
      }

      .lead {
        color: var(--muted);
        margin-top: 8px;
      }

      .search {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .search input {
        border: 1px solid #e8dcff;
        background: #ffffff;
        color: var(--ink);
        border-radius: 14px;
        padding: 13px 14px;
        font: inherit;
      }

      .search button {
        border: 1px solid #e8dcff;
        border-radius: 14px;
        background: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 0 14px;
        cursor: pointer;
      }

      .layout {
        padding-bottom: 46px;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 14px;
      }

      .sidebar {
        position: sticky;
        top: 74px;
        align-self: start;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
        max-height: calc(100vh - 96px);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: thin;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        font-weight: 700;
        border-radius: 11px;
        color: #4f4169;
      }

      .sidebar a:hover {
        background: #f8f2ff;
      }

      .sidebar a.active {
        background: #f5ebff;
        border: 1px solid #e3d3ff;
      }

      .content {
        display: grid;
        gap: 14px;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 16px;
      }

      .section p {
        color: var(--muted);
        margin: 8px 0 0;
      }

      .cards {
        margin-top: 13px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .cmd {
        border: 1px solid #eee3ff;
        border-radius: 14px;
        background: #ffffff;
        padding: 11px;
      }

      .cmd-title {
        font-weight: 800;
        margin-bottom: 8px;
      }

      code {
        background: #f7f2ff;
        border: 1px solid #ede3ff;
        border-radius: 8px;
        padding: 2px 6px;
      }

      .meta {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      mark {
        background: #ffd9f2;
        border-radius: 4px;
      }

      .empty {
        display: none;
        padding: 18px;
        border: 1px dashed #cabdae;
        border-radius: 14px;
        color: var(--muted);
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          display: flex;
          overflow-x: auto;
          gap: 8px;
        }

        .sidebar a {
          white-space: nowrap;
          border: 1px solid #e6dbce;
        }
      }

      @media (max-width: 760px) {
        .cards {
          grid-template-columns: 1fr;
        }
      }

      body {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      body.page-ready {
        opacity: 1;
        transform: translateY(0);
      }

      body.page-exit {
        opacity: 0;
        transform: translateY(-6px);
      }
    </style>
  </head>

      const toc = document.getElementById("toc");
      const content = document.getElementById("content");
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const emptyState = document.getElementById("emptyState");

      const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const PRIORITY_ORDER = [
        "setup",
        "moderation",
        "automod",
        "antinuke",
        "logging",
        "ticket",
        "verification",
        "roles",
        "command-toggle",
        "utility",
        "help",
        "info",
        "confessions",
        "quests",
        "economy",
        "levels",
        "giveaway",
        "suggestion",
        "twitch",
        "youtube",
        "kick",
        "starboard",
        "counting",
        "customvc",
        "boosterrole",
        "rr",
        "rt",
        "birthday",
        "bremind",
        "vanity",
        "stats",
        "status",
        "backup",
        "tz",
        "roleplay",
        "fun",
        "gambling",
        "marry",
        "poj",
        "errors",
        "donation"
      ];
      const priorityMap = new Map(PRIORITY_ORDER.map((id, idx) => [id, idx]));
      const SORTED_DOCS = DOCS.slice().sort((a, b) => {
        const ra = priorityMap.has(a.id) ? priorityMap.get(a.id) : 9999;
        const rb = priorityMap.has(b.id) ? priorityMap.get(b.id) : 9999;
        if (ra !== rb) return ra - rb;
        return a.title.localeCompare(b.title);
      });
      let selectedCategoryId = SORTED_DOCS.length ? SORTED_DOCS[0].id : null;

      function updateActiveCategoryLink() {
        Array.from(toc.querySelectorAll("a")).forEach((a) => {
          a.classList.toggle("active", a.dataset.id === selectedCategoryId);
        });
      }

      function render() {
        toc.innerHTML = "";
        content.innerHTML = "";

        SORTED_DOCS.forEach((section) => {
          const link = document.createElement("a");
          link.href = `#${section.id}`;
          link.textContent = section.title.replace(/^[^ ]+\s/, "");
          link.dataset.id = section.id;
          link.addEventListener("click", (event) => {
            event.preventDefault();
            selectedCategoryId = section.id;
            input.value = "";
            applySearch("");
            updateActiveCategoryLink();
          });
          toc.appendChild(link);

          const card = document.createElement("section");
          card.className = "section";
          card.id = section.id;
          card.style.display = section.id === selectedCategoryId ? "" : "none";

          const h = document.createElement("h2");
          h.textContent = section.title;
          const p = document.createElement("p");
          p.textContent = section.note;

          const grid = document.createElement("div");
          grid.className = "cards";

          section.commands.forEach((c) => {
            const item = document.createElement("article");
            item.className = "cmd";
            item.innerHTML = `
              <div class="cmd-title"><code>${c.cmd}</code></div>
              <div>${c.desc}</div>
              <div class="meta">Perms: ${c.perms}</div>
            `;
            grid.appendChild(item);
          });

          card.appendChild(h);
          card.appendChild(p);
          card.appendChild(grid);
          content.appendChild(card);
        });

        updateActiveCategoryLink();
      }

      function applySearch(query) {
        const q = query.trim().toLowerCase();
        const cards = Array.from(document.querySelectorAll(".section"));
        const reg = q ? new RegExp(`(${escapeRegex(q)})`, "gi") : null;
        let anyVisible = false;

        cards.forEach((section) => {
          const cmdCards = Array.from(section.querySelectorAll(".cmd"));
          let sectionVisible = false;

          cmdCards.forEach((cmd) => {
            const txt = cmd.textContent.toLowerCase();
            const ok = !q || txt.includes(q);
            cmd.style.display = ok ? "" : "none";
            if (ok) sectionVisible = true;

            if (ok && reg) {
              cmd.querySelectorAll(".cmd-title code, .meta, div").forEach((node) => {
                if (!node.dataset.raw) node.dataset.raw = node.textContent;
                node.innerHTML = node.dataset.raw.replace(reg, "<mark>$1</mark>");
              });
            } else {
              cmd.querySelectorAll(".cmd-title code, .meta, div").forEach((node) => {
                if (node.dataset.raw) node.textContent = node.dataset.raw;
              });
            }
          });

          if (q) {
            section.style.display = sectionVisible ? "" : "none";
            if (sectionVisible) anyVisible = true;
          } else {
            const isSelected = section.id === selectedCategoryId;
            section.style.display = isSelected ? "" : "none";
            if (isSelected) anyVisible = true;
          }
        });

        emptyState.style.display = anyVisible ? "none" : "block";
      }

      render();
      input.addEventListener("input", () => applySearch(input.value));
      clearBtn.addEventListener("click", () => {
        input.value = "";
        applySearch("");
        input.focus();
      });

      window.addEventListener("pageshow", () => {
        document.body.classList.add("page-ready");
      });

      document.querySelectorAll('a[href]').forEach((link) => {
        link.addEventListener("click", (event) => {
          const href = link.getAttribute("href");
          if (!href) return;
          if (href.startsWith("#")) return;
          if (href.startsWith("http")) return;
          if (link.target === "_blank") return;

          event.preventDefault();
          document.body.classList.remove("page-ready");
          document.body.classList.add("page-exit");
          setTimeout(() => {
            window.location.href = href;
          }, 220);
        });
      });
    </script>
